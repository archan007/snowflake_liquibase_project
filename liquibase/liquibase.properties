# Liquibase properties template.
# All values come from environment variables set by the CI workflow.
# Do NOT put credentials here.

changeLogFile: liquibase/changelog-master.xml
searchPath: .

# JDBC URL for Snowflake
url: jdbc:snowflake://${SNOWFLAKE_ACCOUNT}.snowflakecomputing.com/?db=${SNOWFLAKE_DATABASE}&warehouse=${SNOWFLAKE_WAREHOUSE}&role=${SNOWFLAKE_ROLE}

# Authentication: key-pair via the Snowflake JDBC driver
# The CI job writes the private key to a temp file and sets these.
username: ${SNOWFLAKE_USER}
driver: net.snowflake.client.jdbc.SnowflakeDriver

# Tracking tables live in a dedicated schema per environment
liquibaseSchemaName: LIQUIBASE
databaseChangeLogTableName: DATABASECHANGELOG
databaseChangeLogLockTableName: DATABASECHANGELOGLOCK

# Fail fast on any error
logLevel: INFO
