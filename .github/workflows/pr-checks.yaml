name: PR checks

# Runs on every pull request targeting dev, uat, or main.
# No Snowflake credentials are used — everything runs offline.
# The goal is to catch bundle/CSV/engine errors before they reach a deploy branch.

on:
  pull_request:
    branches:
      - dev
      - uat
      - main

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate bundles and dry-run engine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate YAML syntax for all bundle/platform files
        run: |
          set -e
          python - <<'PY'
          import sys, pathlib, yaml
          errors = []
          for p in list(pathlib.Path("bundles").rglob("bundle.yaml")) + \
                   list(pathlib.Path("platform").rglob("*.yaml")):
              try:
                  yaml.safe_load(p.read_text())
                  print(f"ok   {p}")
              except yaml.YAMLError as e:
                  errors.append(f"{p}: {e}")
                  print(f"FAIL {p}: {e}")
          if errors:
              sys.exit(1)
          PY

      - name: Run drop-safety regression tests
        run: python test_drop_safety.py

      - name: Engine dry-run (offline) for DEV
        id: dryrun_dev
        run: |
          python -m engine.generate_ddl \
            --env DEV \
            --offline \
            --output-root output/ddl \
            | tee engine-dev.log

      - name: Engine dry-run (offline) for UAT
        run: |
          python -m engine.generate_ddl \
            --env UAT \
            --offline \
            --output-root output/ddl-uat \
            | tee engine-uat.log

      - name: Engine dry-run (offline) for PROD
        run: |
          python -m engine.generate_ddl \
            --env PROD \
            --offline \
            --output-root output/ddl-prod \
            | tee engine-prod.log

      - name: Post summary
        if: always()
        run: |
          {
            echo "## PR check summary"
            echo ""
            echo "### Engine output — DEV"
            echo '```'
            grep -E "^\[engine\]" engine-dev.log || true
            echo '```'
            echo "### Engine output — UAT"
            echo '```'
            grep -E "^\[engine\]" engine-uat.log || true
            echo '```'
            echo "### Engine output — PROD"
            echo '```'
            grep -E "^\[engine\]" engine-prod.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload generated DDL as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ddl-dry-run
          path: output/
          retention-days: 7
